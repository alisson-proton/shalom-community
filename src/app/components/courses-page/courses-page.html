<div class="page-container">
  <div class="page-header">
    <span class="page-icon">📚</span>
    <h1 class="page-title">Cursos</h1>
    <button class="page-admin-btn" *ngIf="isAdmin" (click)="showCreateModal = true">+ Novo Curso</button>
  </div>

  <div class="posts-feed">
    <div class="course-item" *ngFor="let post of posts">
      <app-post-card [post]="post"></app-post-card>
      <div class="course-action">
        <button
          class="subscribe-btn"
          [class.subscribed]="subscribedCourses.has(post.id)"
          [disabled]="subscribedCourses.has(post.id)"
          (click)="openModal(post)">
          {{ subscribedCourses.has(post.id) ? 'Inscrito ✓' : 'Inscrever-se' }}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="posts.length === 0" class="no-posts">
    <p>Nenhum curso disponível no momento.</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" *ngIf="selectedCourse" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="modal-close" (click)="closeModal()">✕</button>

    <!-- Success state -->
    <div class="modal-success" *ngIf="formSubmitted">
      <span class="success-icon">✅</span>
      <h2>Inscrição realizada!</h2>
      <p>Você se inscreveu no curso <strong>{{ selectedCourse.title }}</strong>. Entraremos em contato com mais informações!</p>
      <button class="modal-ok-btn" (click)="closeModal()">Fechar</button>
    </div>

    <!-- Form state -->
    <ng-container *ngIf="!formSubmitted">
      <div class="modal-hero">
        <img [src]="courseImage" [alt]="selectedCourse.title" class="modal-image">
        <div class="modal-hero-overlay">
          <h2 class="modal-title">📚 {{ selectedCourse.title }}</h2>
        </div>
      </div>

      <div class="modal-body">
        <p class="modal-desc">{{ selectedCourse.content }}</p>

        <form class="course-form" (ngSubmit)="submitForm()" #courseForm="ngForm">
          <div class="form-row">
            <div class="form-group">
              <label for="fullName">Nome completo</label>
              <input type="text" id="fullName" name="fullName" [(ngModel)]="form.fullName" required placeholder="Seu nome completo">
            </div>

            <div class="form-group">
              <label for="birthDate">Data de nascimento</label>
              <input type="date" id="birthDate" name="birthDate" [(ngModel)]="form.birthDate" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="whatsapp">WhatsApp</label>
              <input type="tel" id="whatsapp" name="whatsapp" [(ngModel)]="form.whatsapp" required placeholder="(00) 00000-0000">
            </div>

            <div class="form-group">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" [(ngModel)]="form.email" required placeholder="seu@email.com">
            </div>
          </div>

          <div class="form-group">
            <label for="availability">Disponibilidade</label>
            <select id="availability" name="availability" [(ngModel)]="form.availability" required>
              <option value="" disabled>Selecione sua disponibilidade</option>
              <option value="morning">Manhã</option>
              <option value="afternoon">Tarde</option>
              <option value="evening">Noite</option>
              <option value="flexible">Flexível</option>
            </select>
          </div>

          <div class="form-group">
            <label for="aboutYou">Conte um pouco sobre você e por que quer fazer este curso</label>
            <textarea id="aboutYou" name="aboutYou" [(ngModel)]="form.aboutYou" rows="3" required placeholder="Compartilhe sua motivação..."></textarea>
          </div>

          <div class="form-group form-check">
            <label class="checkbox-label">
              <input type="checkbox" name="commitment" [(ngModel)]="form.commitment" required>
              <span>Declaro meu compromisso em participar das aulas e concluir o curso</span>
            </label>
          </div>

          <button type="submit" class="submit-btn" [disabled]="!courseForm.valid || !form.commitment">
            Confirmar inscrição
          </button>
        </form>
      </div>
    </ng-container>
  </div>
</div>

<!-- Admin: Create course modal -->
<app-post-form-modal
  *ngIf="showCreateModal"
  modalTitle="Novo Curso"
  [defaultType]="PostType.COURSE"
  [lockType]="true"
  (close)="showCreateModal = false"
  (postCreated)="onCourseCreated()">
</app-post-form-modal>
