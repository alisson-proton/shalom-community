<div class="members-container">
  <div *ngIf="showLoginForm" class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="logo.png" alt="Comunidade Shalom">
      </div>
      <p>Faça login para acessar o conteúdo exclusivo</p>
      
      <form (submit)="login(); $event.preventDefault()">
        <div class="form-group">
          <label>Email</label>
          <input 
            type="email" 
            [(ngModel)]="email" 
            placeholder="membro@shalom.com"
            required>
        </div>
        
        <div class="form-group">
          <label>Senha</label>
          <input 
            type="password" 
            [(ngModel)]="password" 
            placeholder="Digite sua senha"
            required>
        </div>
        
        <div class="error-message" *ngIf="loginError">
          {{ loginError }}
        </div>
        
        <button type="submit" class="login-btn">Entrar</button>
      </form>
      
      <div class="demo-credentials">
        <p><strong>Credenciais de Demonstração:</strong></p>
        <p>Membro: member@shalom.com (qualquer senha)</p>
        <p>Admin: admin@shalom.com (qualquer senha)</p>
      </div>
    </div>
  </div>

  <div *ngIf="!showLoginForm && user" class="members-feed">
    <div class="posts-feed">
      <app-post-card 
        *ngFor="let post of posts" 
        [post]="post">
      </app-post-card>
    </div>
  </div>
</div>
