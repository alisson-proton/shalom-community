<div class="members-container">
  <div *ngIf="showLoginForm" class="login-container">
    <div class="login-card">
      <h2>🔐 Members Login</h2>
      <p>Please login to access members-only content</p>
      
      <form (submit)="login(); $event.preventDefault()">
        <div class="form-group">
          <label>Email</label>
          <input 
            type="email" 
            [(ngModel)]="email" 
            placeholder="member@shalom.com"
            required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input 
            type="password" 
            [(ngModel)]="password" 
            placeholder="Enter your password"
            required>
        </div>
        
        <div class="error-message" *ngIf="loginError">
          {{ loginError }}
        </div>
        
        <button type="submit" class="login-btn">Login</button>
      </form>
      
      <div class="demo-credentials">
        <p><strong>Demo Credentials:</strong></p>
        <p>Member: member@shalom.com (any password)</p>
        <p>Admin: admin@shalom.com (any password)</p>
      </div>
    </div>
  </div>

  <div *ngIf="!showLoginForm && user" class="members-feed">
    <div class="welcome-banner">
      <h1>Welcome to the Members Area, {{ user.name }}! 🎉</h1>
      <p>Access exclusive content, sermons, courses, and community updates</p>
    </div>

    <div class="posts-grid">
      <app-post-card 
        *ngFor="let post of posts" 
        [post]="post">
      </app-post-card>
    </div>
  </div>
</div>
