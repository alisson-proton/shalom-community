<div class="feed-container">

  <div class="posts-feed">
    <app-post-card
      *ngFor="let post of sortedPosts"
      [post]="post">
    </app-post-card>
  </div>

  <div *ngIf="posts.length === 0" class="no-posts">
    <p>Nenhuma publicação encontrada.</p>
  </div>
</div>

<!-- Admin FAB -->
<button
  *ngIf="isAdmin"
  class="feed-fab"
  (click)="openPostModal()"
  title="Nova publicação"
  aria-label="Nova publicação">
  +
</button>

<!-- Post Creation Modal -->
<app-post-form-modal
  *ngIf="showPostModal"
  modalTitle="Nova Publicação"
  (close)="closePostModal()"
  (postCreated)="onPostCreated()">
</app-post-form-modal>
