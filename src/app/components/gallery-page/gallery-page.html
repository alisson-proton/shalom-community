<div class="page-container">
  <div class="page-header">
    <span class="page-icon">📷</span>
    <h1 class="page-title">Galeria</h1>
    <button class="page-admin-btn" *ngIf="isAdmin" (click)="showCreateModal = true">+ Nova Mídia</button>
  </div>

  <div class="posts-feed">
    <app-post-card *ngFor="let post of posts" [post]="post"></app-post-card>
  </div>

  <div *ngIf="posts.length === 0" class="no-posts">
    <p>Nenhuma foto ou vídeo disponível no momento.</p>
  </div>
</div>

<app-post-form-modal
  *ngIf="showCreateModal"
  modalTitle="Nova Mídia"
  [defaultType]="PostType.GALLERY"
  [lockType]="true"
  (close)="showCreateModal = false"
  (postCreated)="onItemCreated()">
</app-post-form-modal>
