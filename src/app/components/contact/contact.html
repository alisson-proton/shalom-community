<div class="page-container">
  <h1 class="page-title">📩 Fale Conosco</h1>
  <p class="page-subtitle">Preencha o formulário e entraremos em contato com você</p>

  <div class="contact-card" *ngIf="!submitted">
    <form (ngSubmit)="submitForm()">
      <div class="form-group">
        <label for="name">Nome completo *</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Seu nome" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="phone">Telefone / WhatsApp *</label>
        <input id="phone" type="tel" [(ngModel)]="phone" name="phone" placeholder="(43) 99999-9999" required>
      </div>

      <div class="form-group">
        <label for="subject">Assunto *</label>
        <select id="subject" [(ngModel)]="subject" name="subject" required>
          <option value="" disabled>Selecione um assunto</option>
          <option *ngFor="let s of subjects" [value]="s">{{ s }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Mensagem *</label>
        <textarea id="message" [(ngModel)]="message" name="message" rows="4" placeholder="Escreva sua mensagem..." required></textarea>
      </div>

      <button type="submit" class="submit-btn" [disabled]="!name.trim() || !phone.trim() || !subject || !message.trim()">
        Enviar mensagem
      </button>
    </form>
  </div>

  <div class="success-card" *ngIf="submitted">
    <span class="success-icon">✅</span>
    <h2>Mensagem enviada!</h2>
    <p>Obrigado pelo contato. Nossa equipe irá responder o mais breve possível.</p>
    <button (click)="resetForm()" class="reset-btn">Enviar outra mensagem</button>
  </div>
</div>
